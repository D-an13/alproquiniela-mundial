<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">

    <style>
        /* ==========================================================================
           1. FONDO MUNDIALISTA SUTIL Y EFECTO CONFETI OPTIMIZADO
           ========================================================================== */
       html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;          
            overflow: hidden;       
            position: relative;
            
            /* 🏟️ Césped de Estadio Sutil: Colores oscuros y elegantes, nada de "chinto" */
            background-color: #114224; 
            background-image: linear-gradient(
                90deg, 
                #15532d 50%, 
                transparent 50%
            );
            background-size: 160px 100%; /* Franjas más anchas y estéticas en PC */
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

       /* 🎉 Animación de Confeti Original: Fluida, tamaño fino y ciclo infinito sin cortes */
        body::before {
            content: "";
            position: fixed;
            top: -300px; /* Le da espacio arriba para que el flujo sea continuo */
            left: 0;
            width: 100%;
            height: calc(100vh + 300px); /* Altura justa para el desplazamiento */
            pointer-events: none;
            z-index: 1;
            opacity: 0.18; /* Mismo tono tenue que te gustó al inicio */
            
            /* Círculos con el tamaño original fino */
            background-image: 
                radial-gradient(circle, #fef08a 20%, transparent 20%),
                radial-gradient(circle, #ffffff 15%, transparent 15%),
                radial-gradient(circle, #60a5fa 25%, transparent 25%),
                radial-gradient(circle, #fef08a 18%, transparent 18%),
                radial-gradient(circle, #f43f5e 20%, transparent 20%);
            
            /* Regresamos al tamaño original del patrón (300px por 300px) */
            background-size: 300px 300px;
            background-position: 0 0, 110px 150px, 220px 60px, 80px 240px, 190px 190px;
            
            /* Animación matemática perfecta */
            animation: caidaConfeti 18s linear infinite;
            will-change: transform; /* Esto le dice a la GPU que se encargue, rendimiento al 100% */
        }

        @keyframes caidaConfeti {
            0% { 
                transform: translateY(0); 
            }
            100% { 
                /* Se mueve exactamente el tamaño del patrón (300px). El encaje es invisible */
                transform: translateY(300px); 
            }
        }

        /* Contenedor principal que centra la app */
        .app-container {
            display: flex;
            justify-content: center;
            align-items: center;      
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 5; 
        }

        /* Tarjeta Quiniela: Diseño Horizontal para PC, adaptable a Móvil */
        .tarjeta-quiniela {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            max-width: 950px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 30px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Grid que divide el contenido en PC */
        .quiniela-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 30px;
            align-items: stretch;
        }

        /* Secciones internas */
        .col-controles {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 16px;
        }

        .col-marcador {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* Selectores estilizados */
        .select-premium {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.25s ease;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }

        .select-premium:focus {
            border-color: #16a34a;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.15);
        }

        .label-premium {
            font-size: 0.75rem;
            font-weight: 800;
            color: #15803d;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 👑 MODIFICADO: Inputs de Goles Oscuros Premium (Estilo foto 3) y sin Flechas */
        .input-goles {
            width: 85px;
            text-align: center;
            padding: 12px 0;
            margin-top: 12px;
            border-radius: 14px;
            font-size: 1.85rem;
            font-weight: 800;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            
            /* Estilo oscuro original premium */
            background-color: #1e293b !important; 
            color: #ffffff !important;
            border: 2px solid #334155;

            /* Elimina flechas en Firefox */
            -moz-appearance: textfield;
        }

        /* Elimina flechas en Chrome, Safari y Edge (Como pediste en foto 2) */
        .input-goles::-webkit-outer-spin-button,
        .input-goles::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-goles:focus {
            border-color: #16a34a;
            background-color: #0f172a !important; /* Se oscurece sutilmente al enfocar */
            transform: scale(1.05);
        }

        .input-goles:disabled {
            background-color: #cbd5e1 !important;
            color: #64748b !important;
            border-color: #cbd5e1;
            transform: none;
        }

        /* Botón de Guardar */
        .btn-guardar {
            width: 100%;
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(22, 163, 74, 0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-guardar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(22, 163, 74, 0.4);
            filter: brightness(1.1);
        }

        .btn-guardar:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Botón Trofeo Interactivo */
        .trofeo-interactivo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            background: #fef08a;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: transform 0.2s ease-in-out, box-shadow 0.25s ease-in-out;
        }

        .trofeo-interactivo:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 20px 5px rgba(254, 240, 138, 0.7);
        }

        /* Capa de Bloqueo Interna Mejorada */
        .capa-bloqueo {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 250, 252, 0.97);
            border-radius: 18px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px dashed #cbd5e1;
            box-sizing: border-box;
            z-index: 10;
        }

        /* ==========================================================================
           2. RESPONSIVE DESIGN (MÓVIL) Y MODIFICACIONES DE TAMAÑO DE TEXTO
           ========================================================================== */
        /* PC - Tamaños Grandes */
        .tarjeta-quiniela span[style*="font-size: 1.4rem"], 
        .tarjeta-quiniela div style span {
            font-size: 1.75rem !important; 
            font-weight: 900;
            display: flex !important;       
            align-items: center;            
            gap: 16px;                      
            margin-bottom: 20px;
        }

        #txtEstadoPartido {
            font-size: 1.1rem !important; /* Agrandamos Pronóstico Oficial 📅 */
            font-weight: 800;
            letter-spacing: 0.5px;
        }

       @media (max-width: 768px) {
            .app-container {
                padding: 12px;
                min-height: 100vh;            
            }
            
            .tarjeta-quiniela {
                padding: 16px;            
                border-radius: 20px;
            }

            .quiniela-grid {
                grid-template-columns: 1fr; 
                gap: 8px;                 /* Pegamos sutilmente el bloque de arriba con el de abajo */
            }

            .col-controles {
                gap: 6px;                 /* Compactamos los espacios vacíos entre los pasos 1, 2 y 3 */
            }

            /* Reducimos solo el margen inferior de las etiquetas para ganar altura */
            .label-premium {
                margin-bottom: 2px;
            }

            .select-premium {
                padding: 12px 16px;       /* Selectores cómodos y fáciles de tocar */
            }

            /* 🔥 BOTÓN GRANDE Y PREMIUM: Recupera su tamaño original e imponente */
            .btn-guardar {
                padding: 16px;            
                font-size: 1.05rem;
                margin-top: 4px;          /* Separación limpia */
            }

            .col-marcador {
                padding: 14px;            /* Contenedor del pronóstico optimizado */
                min-height: auto;         
            }
            
           /* 👑 TÍTULO EN CELULAR: Tamaños de antes, pero con separación real */
            .tarjeta-quiniela span[style*="font-size: 1.4rem"] {
                font-size: 1.4rem !important; 
                display: flex !important;   
                align-items: center;        
                gap: 14px;                  
                margin-bottom: 12px;        
            }

            /* 🏆 Separación extra entre el emoji del Trofeo y el texto del Título */
            .tarjeta-quiniela span[style*="font-size: 1.4rem"] text,
            .tarjeta-quiniela span[style*="font-size: 1.4rem"]::before {
                margin-right: 12px;        /* Evita que el trofeo y la Q se peguen horizontalmente */
            }

            #txtEstadoPartido {
                font-size: 1.05rem !important; /* "PRONÓSTICO OFICIAL" claro y legible */
            }

            /* Los inputs de los goles se quedan grandes y oscuros */
            .input-goles {
                width: 80px;
                font-size: 1.7rem;
                padding: 10px 0;
                margin-top: 8px;
            }
        }

        /* 🚪 Panel Deslizable Lateral Izquierdo (Ranking) */
        #panelRanking {
            position: fixed;
            top: 0;
            left: -360px;
            width: 340px;
            height: 100%;
            background: #ffffff;
            box-shadow: 10px 0 30px rgba(15, 23, 42, 0.15);
            z-index: 10001; 
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #panelRanking.mostrar-panel-activo {
            left: 0;
        }

        .ranking-header {
            background-color: #15803d;
            color: white;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #16a34a;
        }

        .ranking-header h3 { 
            margin: 0; 
            font-size: 1.1rem; 
            font-weight: bold; 
        }

        .btn-cerrar-ranking {
            background: none;
            border: none;
            color: #bbf7d0;
            font-size: 1.6rem;
            cursor: pointer;
            font-weight: bold;
            line-height: 1;
            padding: 0 5px;
        }

        .btn-cerrar-ranking:hover { color: white; }

        .ranking-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            background: #f8fafc;
        }

        .tabla-ranking {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .tabla-ranking th {
            background-color: #f1f5f9;
            color: #475569;
            padding: 10px 8px; 
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 1px solid #e2e8f0;
        }

        .tabla-ranking td {
            padding: 8px 10px !important; 
            text-align: center;
            font-size: 0.9rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .tabla-ranking tr:last-child td { border-bottom: none; }
        .tabla-ranking tr:nth-child(even) { background-color: #f8fafc; }
        .tabla-ranking tr.puesto-1 td { background-color: #fef9c3; font-weight: bold; color: #854d0e; }
        .tabla-ranking tr.puesto-2 td { background-color: #f1f5f9; font-weight: bold; color: #475569; }
        .tabla-ranking tr.puesto-3 td { background-color: #ffedd5; font-weight: bold; color: #9a3412; }

        .loader-ranking {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            padding: 40px 0;
            font-weight: bold;
        }

/* Estilo dinámico cuando faltan los goles */
        .btn-guardar.estado-pendiente {
            background: linear-gradient(135deg, #f59e0b, #d97706) !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.3) !important;
            cursor: not-allowed;
        }
        
        /* Estilo cuando está totalmente bloqueado (Falta nombre) */
        .btn-guardar:disabled:not(.estado-pendiente) {
            background: #cbd5e1 !important;
            color: #64748b !important;
            border-color: #cbd5e1 !important;
            box-shadow: none !important;
            transform: none !important;
            cursor: not-allowed;
        }

@keyframes fadeInUpPremium {
    from {
        opacity: 0;
        transform: translateY(-8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animacion-tendencia {
    display: block !important;
    animation: fadeInUpPremium 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
    </style>
</head>

        function obtenerBanderaReal(emojiOriginal, nombreEquipo) {
            return emojiOriginal === "🇬🇧" ? "⚽" : emojiOriginal;
        }

        function cargarPartidosPorFase() {
            const faseSeleccionada = document.getElementById('selectFase').value;
            const selectPartido = document.getElementById('selectPartido');
            if (!selectPartido) return; 
            
            const partidosFiltrados = LISTA_PARTIDOS.filter(p => p.fase === faseSeleccionada);
            
            const coloresDias = {
                "28/06": "#ffffff",
                "29/06": "#e0f2fe",
                "30/06": "#fef9c3",
                "01/07": "#dcfce7",
                "02/07": "#f3e8ff",
                "03/07": "#ffe4e6",
                "04/07": "#cef2da", 
                "05/07": "#fef08a",
                "06/07": "#bae6fd", 
                "07/07": "#e2e8f0",
                "09/07": "#cef2da", 
                "10/07": "#bae6fd", 
                "11/07": "#fef08a",
                // 🏆 Tonos nítidos para las Semis, Tercer Lugar y Gran Final
                "14/07": "#f3e8ff", // Martes - Morado místico
                "15/07": "#ffe4e6", // Miércoles - Rosa suave
                "18/07": "#e0f2fe", // Sábado - Celeste fresco (Tercer Lugar)
                "19/07": "#fef08a"  // Domingo - Amarillo oro (¡Gran Final!)
            };
            
            if (partidosFiltrados.length > 0) {
                selectPartido.innerHTML = partidosFiltrados.map(p => {
                    let descLimpia = p.desc.replace(/🇬🇧/g, "⚽");
                    descLimpia = descLimpia.replace(/ - P\d+:/g, " -");
                    
                    const coincidenciaFecha = descLimpia.match(/\d{2}\/\d{2}/);
                    const fechaClave = coincidenciaFecha ? coincidenciaFecha[0] : "";
                    const colorFondo = coloresDias[fechaClave] || "#f1f5f9"; 
                    
                    return `<option value="${p.id}" style="background-color: ${colorFondo}; color: #1e293b; padding: 6px;">${descLimpia}</option>`;
                }).join('');

                // ==========================================================================
                // 🤖 AUTO-ENFOQUE INTELIGENTE RECUPERADO
                // ==========================================================================
                const hoy = new Date();
                const dia = String(hoy.getDate()).padStart(2, '0');
                const mes = String(hoy.getMonth() + 1).padStart(2, '0');
                const fechaHoyClave = `${dia}/${mes}`;

                // Buscamos si hay algún partido para HOY en la fase seleccionada
                const primerPartidoDeHoy = partidosFiltrados.find(p => p.desc.includes(fechaHoyClave));

                if (primerPartidoDeHoy) {
                    selectPartido.value = primerPartidoDeHoy.id;
                    console.log(`🤖 Auto-enfocado con éxito en el juego de hoy: ${primerPartidoDeHoy.id}`);
                }
            } else {
                selectPartido.innerHTML = `<option value="">No hay partidos para esta fase</option>`;
            }
            
            cambiarPartidoSeleccionado();
        }

        function cambiarPartidoSeleccionado() {
            const selectPartido = document.getElementById('selectPartido');
            if (!selectPartido) return;

            const idSel = selectPartido.value;
            if (!idSel) return;
            
            const partido = LISTA_PARTIDOS.find(p => p.id === idSel);
            if (!partido) return;

            const lblLocal = document.getElementById('lblLocal');
            const flagLocal = document.getElementById('flagLocal');
            const lblVisitante = document.getElementById('lblVisitante');
            const flagVisitante = document.getElementById('flagVisitante');

            const inputGolesLocal = document.getElementById('golesLocal');
            const inputGolesVisita = document.getElementById('golesVisitante');

            // Limpiar inputs al cambiar de partido
            if (inputGolesLocal) inputGolesLocal.value = "";
            if (inputGolesVisita) inputGolesVisita.value = "";

            if (lblLocal) lblLocal.innerText = partido.loc;
            if (flagLocal) flagLocal.innerText = obtenerBanderaReal(partido.flLoc, partido.loc);

                if (inputGolesVisitante) inputGolesVisitante.value = gVisitante;
                verificarBloqueoPartido();
            });
        }

        // Buscamos si existe la info del partido en tu LISTA_PARTIDOS para traer banderas o nombres nítidos si se requiere.
        // Si no, usamos los datos crudos que guardas en el array.
        const infoPartido = window.LISTA_PARTIDOS ? LISTA_PARTIDOS.find(part => part.id === p.idPartido) : null;
        const local = infoPartido ? infoPartido.loc : (p.equipoLocal || "Local");
        const visitante = infoPartido ? infoPartido.vis : (p.equipoVisitante || "Visitante");

        const divPartido = document.createElement("div");
        divPartido.style.cssText = `
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: 0.85rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        `;

        divPartido.innerHTML = `
            <span style="font-weight: 700; color: #475569;">👤 ${p.participante}</span>
            <span style="color: #1e293b; font-weight: 500;">
                ${local} <strong style="color: #15803d; background: #dcfce7; padding: 2px 6px; border-radius: 4px;">${p.golesLocal}</strong> 
                : 
                <strong style="color: #15803d; background: #dcfce7; padding: 2px 6px; border-radius: 4px;">${p.golesVisitante}</strong> ${visitante}
            </span>
        `;
        contenedorHistorial.appendChild(divPartido);
    });
}

// EASTER EGG SECRETO: MINIJUEGO DE PENALES (TRAYECTORIA LIMITADA + ALTURA FIJA)

        <div class="cancha-mini">
            <div class="porteria-mini" onclick="dispararPenalPro(event)">
                <span id="porteroMini" class="portero-animado">🧤</span>

            <span id="balonMini">⚽</span>

        document.getElementById('recordGoles').innerText = localStorage.getItem('quiniela_record_juego');

}

let jugandoPateando = false;
let golesActuales = 0;

function dispararPenalPro(event) {
    if (jugandoPateando) return;
    jugandoPateando = true;

    const cancha = document.querySelector('.cancha-mini');
    const balon = document.getElementById('balonMini');
    const portero = document.getElementById('porteroMini');
    const modal = document.getElementById('modalMinijuegoSecreto');
    const score = document.getElementById('scoreGoles');
    const recordLabel = document.getElementById('recordGoles');
    const feedback = document.getElementById('feedbackJuego');

    const rectCancha = cancha.getBoundingClientRect();
    const clickCanchaX = event.clientX - rectCancha.left;
    const centroCanchaX = rectCancha.width / 2;
    
    // Calcular el desvío original en píxeles
    let desvioPx = clickCanchaX - centroCanchaX;

    // 🛠️ LIMITADOR DE TRAYECTORIA (ANTI-TRAMPA)
    // El ancho de la portería ocupa el 80% central de la cancha.
    // El límite físico de atajada del portero está aprox. entre el 10% y el 90% de la cancha.
    const maxDesvioPx = rectCancha.width * 0.38; // Restringe el desvío máximo para que no pase de los postes

    if (desvioPx > maxDesvioPx) {
        desvioPx = maxDesvioPx; // Forzar el balón a ir al poste derecho
    } else if (desvioPx < -maxDesvioPx) {
        desvioPx = -maxDesvioPx; // Forzar el balón a ir al poste izquierdo
    }

    // Calcular la posición exacta de impacto real modificada por los postes
    const disparoRealX = centroCanchaX + desvioPx;

    // Ejecutar tiro: Altura bajada a '95px' idéntica a los guantes
    balon.style.transition = 'all 0.35s cubic-bezier(0.1, 0.4, 0.45, 1)';
    balon.style.bottom = '95px'; 
    balon.style.left = `calc(50% + ${desvioPx}px)`;
    balon.style.transform = `translateX(-50%) scale(0.45) rotate(360deg)`;

    // Evaluar atajada basándose estrictamente en la colisión física modificada
    setTimeout(() => {
        const porteroLeft = portero.offsetLeft;
        const porteroAncho = portero.offsetWidth;
        const centroPorteroPx = porteroLeft + (porteroAncho / 2);
        
        // Comparamos los guantes contra la coordenada real del balón
        const balonCanchaPx = disparoRealX;

        if (Math.abs(centroPorteroPx - balonCanchaPx) < 32) {
            modal.classList.add('alerta-roja');
            feedback.style.color = '#991b1b'; 
            feedback.innerText = "❌ ¡LO PARÓ EL PORTERO!";
            golesActuales = 0;
            score.innerText = golesActuales;

            setTimeout(() => {
                balon.style.transition = 'none';
                balon.className = 'efecto-rebote-activo';
            }, 30);
        } else {
            feedback.style.color = '#065f46'; 
            feedback.innerText = "GOOOOOOOOOOL";
            golesActuales++;
            score.innerText = golesActuales;

            let recordActual = parseInt(localStorage.getItem('quiniela_record_juego') || 0);
            if (golesActuales > recordActual) {
                localStorage.setItem('quiniela_record_juego', golesActuales);
                recordLabel.innerText = golesActuales;
            }
        }
    }, 320);

    // Resetear el escenario de forma limpia
    setTimeout(() => {
        balon.className = '';
        balon.style.transition = 'none';
        balon.style.bottom = '15px';
        balon.style.left = '50%';
        balon.style.transform = 'translateX(-50%) scale(1) rotate(0deg)';
        modal.classList.remove('alerta-roja');
        feedback.innerText = "";
        
        jugandoPateando = false;
    }, 2000);
}

// Añadimos el parámetro "conEspera" (por defecto false para que no espere a menos que se lo pidas)
function calcularYMostrarTendencias(idPartido, conEspera = false) {
    const contenedorTendencias = document.getElementById('contenedorTendenciasComunidad');
    if (!contenedorTendencias) return;

    // Calcular estadísticas de HISTORIAL_GENERAL_SHEETS
    const votosPartido = HISTORIAL_GENERAL_SHEETS.filter(p => p.idPartido.toString() === idPartido.toString());
    const totalVotos = votosPartido.length;

    let local = 0, empate = 0, visita = 0;
    if (totalVotos > 0) {
        votosPartido.forEach(v => {
            const gl = parseInt(v.golesLocal);
            const gv = parseInt(v.golesVisitante);
            if (gl > gv) local++;
            else if (gl < gv) visita++;
            else empate++;
        });
    }

    const pctLocal = totalVotos > 0 ? Math.round((local / totalVotos) * 100) : 0;
    const pctEmpate = totalVotos > 0 ? Math.round((empate / totalVotos) * 100) : 0;
    const pctVisita = totalVotos > 0 ? Math.round((visita / totalVotos) * 100) : 0;

    // Activamos el bloque contenedor
    contenedorTendencias.style.display = 'block';

    // Manejo de retraso inicial base (3 segundos si es guardado fresco, 0 si está navegando)
    const baseDelay = conEspera ? 3000 : 0;

    // Definición de clases para cascada
    const claseTitulo = conEspera ? "animar-item retraso-titulo" : "animar-item";
    const claseLocal  = conEspera ? "animar-item retraso-local"  : "animar-item";
    const claseEmpate = conEspera ? "animar-item retraso-empate" : "animar-item";
    const claseVisita = conEspera ? "animar-item retraso-visita" : "animar-item";

    contenedorTendencias.innerHTML = `
        <style>
            @keyframes aparecerCascada {
                from { opacity: 0; transform: translateY(-8px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animar-item {
                opacity: 0;
                animation: aparecerCascada 0.5s ease forwards;
            }
            .retraso-titulo  { animation-delay: 3.0s; }
            .retraso-local   { animation-delay: 3.4s; }
            .retraso-empate  { animation-delay: 3.8s; }
            .retraso-visita  { animation-delay: 4.2s; }

            .barra-progreso-dinamica {
                width: 0%;
                transition: none !important; 
            }

            /* 📱 AJUSTES EXCLUSIVOS PARA CELULARES */
            @media (max-width: 480px) {
                .contenedor-columnas-tendencia {
                    gap: 16px !important;       
                    max-width: 285px !important; 
                }
                .columna-item-tendencia {
                    min-width: 62px !important;  
                }
                .columna-item-tendencia .wrapper-barra {
                    width: 85% !important;       
                }
            }
        </style>

        <div class="${claseTitulo}" style="text-align: center; width: 100%; display: flex; justify-content: center; align-items: center; gap: 4px; margin-bottom: 15px; margin-top: 5px;">
            <span style="font-size: 0.75rem; font-weight: 800; color: #475569; letter-spacing: 0.6px; text-transform: uppercase;">
                📊 Tendencia del Equipo Alpromeh
            </span>
        </div>
        
        <div class="contenedor-columnas-tendencia" style="display: flex; justify-content: center; align-items: center; text-align: center; gap: 35px; max-width: 340px; margin: 0 auto; width: 100%;">
            
            <div class="columna-item-tendencia ${claseLocal}" style="flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 70px;">
                <span style="font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 2px;">Local</span>
                <span id="numContadorLocal" style="font-size: 1.3rem; font-weight: 900; color: #f97316; margin-bottom: 5px;">0%</span>
                <div class="wrapper-barra" style="width: 100%; background-color: #cbd5e1; height: 4px; border-radius: 99px; overflow: hidden;">
                    <div id="barraLocal" class="barra-progreso-dinamica" style="background-color: #f97316; height: 100%;"></div>
                </div>
            </div>

            <div class="columna-item-tendencia ${claseEmpate}" style="flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 70px;">
                <span style="font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 2px;">Empate</span>
                <span id="numContadorEmpate" style="font-size: 1.3rem; font-weight: 900; color: #475569; margin-bottom: 5px;">0%</span>
                <div class="wrapper-barra" style="width: 100%; background-color: #cbd5e1; height: 4px; border-radius: 99px; overflow: hidden;">
                    <div id="barraEmpate" class="barra-progreso-dinamica" style="background-color: #475569; height: 100%;"></div>
                </div>
            </div>

            <div class="columna-item-tendencia ${claseVisita}" style="flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 70px;">
                <span style="font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 2px;">Visita</span>
                <span id="numContadorVisita" style="font-size: 1.3rem; font-weight: 900; color: #6366f1; margin-bottom: 5px;">0%</span>
                <div class="wrapper-barra" style="width: 100%; background-color: #cbd5e1; height: 4px; border-radius: 99px; overflow: hidden;">
                    <div id="barraVisita" class="barra-progreso-dinamica" style="background-color: #6366f1; height: 100%;"></div>
                </div>
            </div>

        </div>
    `;

    // 🚀 ANIMACIÓN SIMULTÁNEA UNIFICADA
    function dispararAnimacionSimultanea(idTxt, idBarra, valorMeta) {
        const elementoTxt = document.getElementById(idTxt);
        const elementoBarra = document.getElementById(idBarra);
        if (!elementoTxt || !elementoBarra) return;

        if (valorMeta === 0) {
            elementoTxt.innerText = "0%";
            elementoBarra.style.width = "0%";
            return;
        }

        let contadorActual = 0;
        const duracionTotal = 800; 
        const intervaloTiempo = Math.floor(duracionTotal / valorMeta);

        const idIntervalo = setInterval(() => {
            contadorActual++;
            elementoTxt.innerText = `${contadorActual}%`;
            elementoBarra.style.width = `${contadorActual}%`;

            if (contadorActual >= valorMeta) {
                clearInterval(idIntervalo);
            }
        }, Math.max(intervaloTiempo, 12));
    }

    // Programar la animación respetando la cascada y el tiempo de espera configurado
    setTimeout(() => dispararAnimacionSimultanea("numContadorLocal", "barraLocal", pctLocal), baseDelay + (conEspera ? 400 : 0));
    setTimeout(() => dispararAnimacionSimultanea("numContadorEmpate", "barraEmpate", pctEmpate), baseDelay + (conEspera ? 800 : 0));
    setTimeout(() => dispararAnimacionSimultanea("numContadorVisita", "barraVisita", pctVisita), baseDelay + (conEspera ? 1200 : 0));
}
    </script>
