<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">

    <style>
        /* ==========================================================================
           1. FONDO MUNDIALISTA SUTIL Y EFECTO CONFETI OPTIMIZADO
           ========================================================================== */
       html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;          
            overflow: hidden;       
            position: relative;
            
            /* 🏟️ Césped de Estadio Sutil: Colores oscuros y elegantes, nada de "chinto" */
            background-color: #114224; 
            background-image: linear-gradient(
                90deg, 
                #15532d 50%, 
                transparent 50%
            );
            background-size: 160px 100%; /* Franjas más anchas y estéticas en PC */
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

       /* 🎉 Animación de Confeti Original: Fluida, tamaño fino y ciclo infinito sin cortes */
        body::before {
            content: "";
            position: fixed;
            top: -300px; /* Le da espacio arriba para que el flujo sea continuo */
            left: 0;
            width: 100%;
            height: calc(100vh + 300px); /* Altura justa para el desplazamiento */
            pointer-events: none;
            z-index: 1;
            opacity: 0.18; /* Mismo tono tenue que te gustó al inicio */
            
            /* Círculos con el tamaño original fino */
            background-image: 
                radial-gradient(circle, #fef08a 20%, transparent 20%),
                radial-gradient(circle, #ffffff 15%, transparent 15%),
                radial-gradient(circle, #60a5fa 25%, transparent 25%),
                radial-gradient(circle, #fef08a 18%, transparent 18%),
                radial-gradient(circle, #f43f5e 20%, transparent 20%);
            
            /* Regresamos al tamaño original del patrón (300px por 300px) */
            background-size: 300px 300px;
            background-position: 0 0, 110px 150px, 220px 60px, 80px 240px, 190px 190px;
            
            /* Animación matemática perfecta */
            animation: caidaConfeti 18s linear infinite;
            will-change: transform; /* Esto le dice a la GPU que se encargue, rendimiento al 100% */
        }

        @keyframes caidaConfeti {
            0% { 
                transform: translateY(0); 
            }
            100% { 
                /* Se mueve exactamente el tamaño del patrón (300px). El encaje es invisible */
                transform: translateY(300px); 
            }
        }

        /* Contenedor principal que centra la app */
        .app-container {
            display: flex;
            justify-content: center;
            align-items: center;      
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 5; 
        }

        /* Tarjeta Quiniela: Diseño Horizontal para PC, adaptable a Móvil */
        .tarjeta-quiniela {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            max-width: 950px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 30px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Grid que divide el contenido en PC */
        .quiniela-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 30px;
            align-items: stretch;
        }

        /* Secciones internas */
        .col-controles {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 16px;
        }

        .col-marcador {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* Selectores estilizados */
        .select-premium {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.25s ease;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }

        .select-premium:focus {
            border-color: #16a34a;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.15);
        }

        .label-premium {
            font-size: 0.75rem;
            font-weight: 800;
            color: #15803d;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 👑 MODIFICADO: Inputs de Goles Oscuros Premium (Estilo foto 3) y sin Flechas */
        .input-goles {
            width: 85px;
            text-align: center;
            padding: 12px 0;
            margin-top: 12px;
            border-radius: 14px;
            font-size: 1.85rem;
            font-weight: 800;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            
            /* Estilo oscuro original premium */
            background-color: #1e293b !important; 
            color: #ffffff !important;
            border: 2px solid #334155;

            /* Elimina flechas en Firefox */
            -moz-appearance: textfield;
        }

        /* Elimina flechas en Chrome, Safari y Edge (Como pediste en foto 2) */
        .input-goles::-webkit-outer-spin-button,
        .input-goles::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-goles:focus {
            border-color: #16a34a;
            background-color: #0f172a !important; /* Se oscurece sutilmente al enfocar */
            transform: scale(1.05);
        }

        .input-goles:disabled {
            background-color: #cbd5e1 !important;
            color: #64748b !important;
            border-color: #cbd5e1;
            transform: none;
        }

        /* Botón de Guardar */
        .btn-guardar {
            width: 100%;
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(22, 163, 74, 0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-guardar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(22, 163, 74, 0.4);
            filter: brightness(1.1);
        }

        .btn-guardar:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Botón Trofeo Interactivo */
        .trofeo-interactivo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            background: #fef08a;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: transform 0.2s ease-in-out, box-shadow 0.25s ease-in-out;
        }

        .trofeo-interactivo:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 20px 5px rgba(254, 240, 138, 0.7);
        }

        /* Capa de Bloqueo Interna Mejorada */
        .capa-bloqueo {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 250, 252, 0.97);
            border-radius: 18px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px dashed #cbd5e1;
            box-sizing: border-box;
            z-index: 10;
        }

        /* ==========================================================================
           2. RESPONSIVE DESIGN (MÓVIL) Y MODIFICACIONES DE TAMAÑO DE TEXTO
           ========================================================================== */
        /* PC - Tamaños Grandes */
        .tarjeta-quiniela span[style*="font-size: 1.4rem"], 
        .tarjeta-quiniela div style span {
            font-size: 1.75rem !important; 
            font-weight: 900;
            display: flex !important;       
            align-items: center;            
            gap: 16px;                      
            margin-bottom: 20px;
        }

        #txtEstadoPartido {
            font-size: 1.1rem !important; /* Agrandamos Pronóstico Oficial 📅 */
            font-weight: 800;
            letter-spacing: 0.5px;
        }

       @media (max-width: 768px) {
            .app-container {
                padding: 12px;
                min-height: 100vh;            
            }
            
            .tarjeta-quiniela {
                padding: 16px;            
                border-radius: 20px;
            }

            .quiniela-grid {
                grid-template-columns: 1fr; 
                gap: 8px;                 /* Pegamos sutilmente el bloque de arriba con el de abajo */
            }

            .col-controles {
                gap: 6px;                 /* Compactamos los espacios vacíos entre los pasos 1, 2 y 3 */
            }

            /* Reducimos solo el margen inferior de las etiquetas para ganar altura */
            .label-premium {
                margin-bottom: 2px;
            }

            .select-premium {
                padding: 12px 16px;       /* Selectores cómodos y fáciles de tocar */
            }

            /* 🔥 BOTÓN GRANDE Y PREMIUM: Recupera su tamaño original e imponente */
            .btn-guardar {
                padding: 16px;            
                font-size: 1.05rem;
                margin-top: 4px;          /* Separación limpia */
            }

            .col-marcador {
                padding: 14px;            /* Contenedor del pronóstico optimizado */
                min-height: auto;         
            }
            
           /* 👑 TÍTULO EN CELULAR: Tamaños de antes, pero con separación real */
            .tarjeta-quiniela span[style*="font-size: 1.4rem"] {
                font-size: 1.4rem !important; 
                display: flex !important;   
                align-items: center;        
                gap: 14px;                  
                margin-bottom: 12px;        
            }

            /* 🏆 Separación extra entre el emoji del Trofeo y el texto del Título */
            .tarjeta-quiniela span[style*="font-size: 1.4rem"] text,
            .tarjeta-quiniela span[style*="font-size: 1.4rem"]::before {
                margin-right: 12px;        /* Evita que el trofeo y la Q se peguen horizontalmente */
            }

            #txtEstadoPartido {
                font-size: 1.05rem !important; /* "PRONÓSTICO OFICIAL" claro y legible */
            }

            /* Los inputs de los goles se quedan grandes y oscuros */
            .input-goles {
                width: 80px;
                font-size: 1.7rem;
                padding: 10px 0;
                margin-top: 8px;
            }
        }

        /* 🚪 Panel Deslizable Lateral Izquierdo (Ranking) */
        #panelRanking {
            position: fixed;
            top: 0;
            left: -360px;
            width: 340px;
            height: 100%;
            background: #ffffff;
            box-shadow: 10px 0 30px rgba(15, 23, 42, 0.15);
            z-index: 10001; 
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #panelRanking.mostrar-panel-activo {
            left: 0;
        }

        .ranking-header {
            background-color: #15803d;
            color: white;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #16a34a;
        }

        .ranking-header h3 { 
            margin: 0; 
            font-size: 1.1rem; 
            font-weight: bold; 
        }

        .btn-cerrar-ranking {
            background: none;
            border: none;
            color: #bbf7d0;
            font-size: 1.6rem;
            cursor: pointer;
            font-weight: bold;
            line-height: 1;
            padding: 0 5px;
        }

        .btn-cerrar-ranking:hover { color: white; }

        .ranking-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            background: #f8fafc;
        }

        .tabla-ranking {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .tabla-ranking th {
            background-color: #f1f5f9;
            color: #475569;
            padding: 10px 8px; 
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 1px solid #e2e8f0;
        }

        .tabla-ranking td {
            padding: 8px 10px !important; 
            text-align: center;
            font-size: 0.9rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .tabla-ranking tr:last-child td { border-bottom: none; }
        .tabla-ranking tr:nth-child(even) { background-color: #f8fafc; }
        .tabla-ranking tr.puesto-1 td { background-color: #fef9c3; font-weight: bold; color: #854d0e; }
        .tabla-ranking tr.puesto-2 td { background-color: #f1f5f9; font-weight: bold; color: #475569; }
        .tabla-ranking tr.puesto-3 td { background-color: #ffedd5; font-weight: bold; color: #9a3412; }

        .loader-ranking {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            padding: 40px 0;
            font-weight: bold;
        }

/* Estilo dinámico cuando faltan los goles */
        .btn-guardar.estado-pendiente {
            background: linear-gradient(135deg, #f59e0b, #d97706) !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.3) !important;
            cursor: not-allowed;
        }
        
        /* Estilo cuando está totalmente bloqueado (Falta nombre) */
        .btn-guardar:disabled:not(.estado-pendiente) {
            background: #cbd5e1 !important;
            color: #64748b !important;
            border-color: #cbd5e1 !important;
            box-shadow: none !important;
            transform: none !important;
            cursor: not-allowed;
        }
    </style>
</head>

        function obtenerBanderaReal(emojiOriginal, nombreEquipo) {
            return emojiOriginal === "🇬🇧" ? "⚽" : emojiOriginal;
        }

        function cargarPartidosPorFase() {
            const faseSeleccionada = document.getElementById('selectFase').value;
            const selectPartido = document.getElementById('selectPartido');
            if (!selectPartido) return; 
            
            const partidosFiltrados = LISTA_PARTIDOS.filter(p => p.fase === faseSeleccionada);
            
            const coloresDias = {
                "28/06": "#ffffff",
                "29/06": "#e0f2fe",
                "30/06": "#fef9c3",
                "01/07": "#dcfce7",
                "02/07": "#f3e8ff",
                "03/07": "#ffe4e6"
            };
            
            if (partidosFiltrados.length > 0) {
                selectPartido.innerHTML = partidosFiltrados.map(p => {
                    let descLimpia = p.desc.replace(/🇬🇧/g, "⚽");
                    descLimpia = descLimpia.replace(/ - P\d+:/g, " -");
                    
                    const coincidenciaFecha = descLimpia.match(/\d{2}\/\d{2}/);
                    const fechaClave = coincidenciaFecha ? coincidenciaFecha[0] : "";
                    const colorFondo = coloresDias[fechaClave] || "#f1f5f9"; 
                    
                    return `<option value="${p.id}" style="background-color: ${colorFondo}; color: #1e293b; padding: 6px;">${descLimpia}</option>`;
                }).join('');
            } else {
                selectPartido.innerHTML = `<option value="">No hay partidos para esta fase</option>`;
            }
            
            cambiarPartidoSeleccionado();
        }

       function cambiarPartidoSeleccionado() {
            const selectPartido = document.getElementById('selectPartido');
            if (!selectPartido) return;

            const idSel = selectPartido.value;
            if (!idSel) return;
            
            const partido = LISTA_PARTIDOS.find(p => p.id === idSel);
            if (!partido) return;

            const lblLocal = document.getElementById('lblLocal');
            const flagLocal = document.getElementById('flagLocal');
            const lblVisitante = document.getElementById('lblVisitante');
            const flagVisitante = document.getElementById('flagVisitante');

            const inputGolesLocal = document.getElementById('golesLocal');
            const inputGolesVisita = document.getElementById('golesVisitante');

            // 🧼 ¡EL FIX AQUÍ! Cada vez que cambie de partido, limpiamos los inputs 
            // para que no se queden arrastrando los goles del partido anterior.
            if (inputGolesLocal) inputGolesLocal.value = "";
            if (inputGolesVisita) inputGolesVisita.value = "";

            if (lblLocal) lblLocal.innerText = partido.loc;
            if (flagLocal) flagLocal.innerText = obtenerBanderaReal(partido.flLoc, partido.loc); 
            if (lblVisitante) lblVisitante.innerText = partido.vis;
            if (flagVisitante) flagVisitante.innerText = obtenerBanderaReal(partido.flVis, partido.vis); 

            // --- MAGIA PARA BLOQUEAR FASES FUTURAS ---
            let msgEspera = document.getElementById('msgFaseEspera');

            if (idSel.startsWith("FUT_")) {
                if (inputGolesLocal) inputGolesLocal.style.display = 'none';
                if (inputGolesVisita) inputGolesVisita.style.display = 'none';
                
                if (!msgEspera) {
                    msgEspera = document.createElement('div');
                    msgEspera.id = 'msgFaseEspera';
                    msgEspera.className = "text-center py-3 px-4 bg-gray-50 rounded-lg border border-dashed border-gray-300 my-2";
                    msgEspera.innerHTML = `
                        <span class="text-sm font-semibold text-slate-500 block">⏳ Fase en espera</span>
                        <span class="text-xs text-slate-400 block mt-0.5">Falta por definir a los equipos clasificados</span>
                    `;
                    const contenedorPronostico = lblLocal.closest('.flex') || lblLocal.parentElement;
                    if (contenedorPronostico) {
                        contenedorPronostico.appendChild(msgEspera);
                    }
                } else {
                    msgEspera.style.display = 'block';
                }
            } else {
                if (inputGolesLocal) inputGolesLocal.style.display = '';
                if (inputGolesVisita) inputGolesVisita.style.display = '';
                if (msgEspera) msgEspera.style.display = 'none';
            }

            verificarBloqueoPartido();
        }

        function actualizarHistorialDesdeSheets() {
            if (!URL_SCRIPT) return;
            fetch(`${URL_SCRIPT}?tipo=quiniela`)
            .then(response => response.json())
            .then(datos => {
                HISTORIAL_GENERAL_SHEETS = datos;
                verificarBloqueoPartido();
            })
            .catch(error => console.error("Error cargando historial global:", error));
        }

        // ==========================================================================
        // FUNCIÓN VERIFICAR BLOQUEO OPTIMIZADA Y CORREGIDA
        // ==========================================================================
        function verificarBloqueoPartido() {
            const usuario = document.getElementById('quinielaParticipante').value;
            const idSel = document.getElementById('selectPartido').value;
            
            const capaBloqueo = document.getElementById('bloqueoMensaje');
            const btnGuardar = document.getElementById('btnGuardarQuiniela');
            const txtMarcador = document.getElementById('txtMarcadorGuardado');
            
            const inputGolesLocal = document.getElementById('golesLocal');
            const inputGolesVisitante = document.getElementById('golesVisitante');

            if (inputGolesLocal) inputGolesLocal.disabled = false;
            if (inputGolesVisitante) inputGolesVisitante.disabled = false;

            btnGuardar.classList.remove("estado-pendiente");
            btnGuardar.style.background = ""; 

            // CASO 1: Si falta seleccionar el nombre de usuario o el partido
            if (!usuario || !idSel) {
                if (capaBloqueo) capaBloqueo.style.display = "none";
                btnGuardar.disabled = true;
                btnGuardar.innerText = "🔒 Bloqueado (Falta tu Nombre)";
                return; 
            }

            const partido = LISTA_PARTIDOS.find(p => p.id === idSel);
            const ahora = new Date();

            const prediccionExistente = HISTORIAL_GENERAL_SHEETS.find(
                p => p.participante.trim().toLowerCase() === usuario.trim().toLowerCase() && p.idPartido.toString() === idSel.toString()
            );

            if (prediccionExistente) {
                if (inputGolesLocal) inputGolesLocal.value = prediccionExistente.golesLocal;
                if (inputGolesVisitante) inputGolesVisitante.value = prediccionExistente.golesVisitante;
                if (inputGolesLocal) inputGolesLocal.disabled = true;
                if (inputGolesVisitante) inputGolesVisitante.disabled = true;
            }

            // CASO 2: Si el partido ya caducó por tiempo de bloqueo
            if (partido && partido.bloqueo && ahora >= partido.bloqueo) {
                if (prediccionExistente) {
                    if (txtMarcador) txtMarcador.innerHTML = `<span style="font-size: 2.2rem; font-weight: 800; letter-spacing: 2px;">${prediccionExistente.golesLocal} - ${prediccionExistente.golesVisitante}</span>`;
                } else {
                    if (txtMarcador) txtMarcador.innerHTML = `<span style="font-size: 2.2rem; font-weight: 800; color: #94a3b8;">- - -</span>`;
                    if (inputGolesLocal) inputGolesLocal.value = "";
                    if (inputGolesVisitante) inputGolesVisitante.value = "";
                    if (inputGolesLocal) inputGolesLocal.disabled = true;
                    if (inputGolesVisitante) inputGolesVisitante.disabled = true;
                }

                if (capaBloqueo) capaBloqueo.style.display = "flex";
                btnGuardar.disabled = true;
                btnGuardar.style.background = "#ef4444"; 
                btnGuardar.style.cursor = "not-allowed"; 
                btnGuardar.innerText = "⏰ Tiempo Agotado ¡Ya empezó!";
                return;
            }

            // CASO 3: Si el usuario ya guardó previamente una predicción
            if (prediccionExistente) {
                if (txtMarcador) txtMarcador.innerHTML = `<span style="font-size: 2.2rem; font-weight: 800; letter-spacing: 2px;">${prediccionExistente.golesLocal} - ${prediccionExistente.golesVisitante}</span>`;
                if (capaBloqueo) capaBloqueo.style.display = "flex";
                btnGuardar.disabled = true;
                btnGuardar.innerText = "🔒 Bloqueado (Ya participaste)";
                return;
            }

            // CASO 4: El partido está libre, evaluamos si ingresó los goles
            if (capaBloqueo) capaBloqueo.style.display = "none";
            
            const gLocal = inputGolesLocal ? inputGolesLocal.value : "";
            const gVisitante = inputGolesVisitante ? inputGolesVisitante.value : "";
            const tieneGoles = gLocal !== "" && gVisitante !== "";

            if (!tieneGoles) {
                btnGuardar.disabled = true;
                btnGuardar.classList.add("estado-pendiente"); 
                btnGuardar.innerText = "✍️ Completa los goles para guardar";
            } else {
                btnGuardar.disabled = false;
                btnGuardar.style.background = "#16a34a"; 
                btnGuardar.style.color = "#ffffff";
                btnGuardar.style.cursor = "pointer"; 
                btnGuardar.innerText = "⚽ Guardar mi Predicción";
            }
        }

 // ==========================================================================
        // FUNCIÓN DE NOTIFICACIÓN PREMIUM: LIQUID GLASS 100% TRANSPARENTE
        // ==========================================================================
        function mostrarModalApple(titulo, mensaje) {
            // 1. Inyectar dinámicamente los estilos de lente de agua pura sin fondo blanco
            if (!document.getElementById('estilosModalApple')) {
                const estilos = document.createElement('style');
                estilos.id = 'estilosModalApple';
                estilos.innerHTML = `
                    @keyframes liquidLensIn {
                        from { 
                            opacity: 0; 
                            transform: translate(-50%, -50%) scale(0.95); 
                        }
                        to { 
                            opacity: 1; 
                            transform: translate(-50%, -50%) scale(1.03); /* Mantiene el efecto lupa/aumento */
                        }
                    }
                    @keyframes liquidLensOut {
                        from { transform: translate(-50%, -50%) scale(1.03); opacity: 1; }
                        to { transform: translate(-50%, -50%) scale(0.98); opacity: 0; }
                    }
                    .modal-apple-glass {
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        z-index: 12000;
                        width: 90%;
                        
                        /* 🖥️ Dimensiones para PC */
                        max-width: 750px;
                        padding: 45px 35px;
                        
                        /* 💧 TRANSPARENCIA ABSOLUTA: Nada de fondo blanco, agua 100% pura */
                        background: transparent;
                        
                        /* Mantenemos el blur y saturate para distorsionar orgánicamente el fondo verde */
                        backdrop-filter: blur(12px) saturate(150%);
                        -webkit-backdrop-filter: blur(12px) saturate(150%);
                        
                        /* 🎨 BORDES DE CRISTAL: Definen la silueta de la gota usando solo luz */
                        border: 1px solid rgba(255, 255, 255, 0.25);
                        border-top: 2.5px solid rgba(255, 255, 255, 0.8);  /* Destello de luz superior más marcado */
                        border-left: 2px solid rgba(255, 255, 255, 0.55);
                        border-radius: 36px;
                        
                        /* 🔮 REFRACCIÓN ÓPTICA SIN COLOR: Sombras que moldean el relieve del agua */
                        box-shadow: 
                            0 35px 80px rgba(15, 23, 42, 0.2),              /* Sombra proyectada en el fondo */
                            inset 0 3px 6px rgba(255, 255, 255, 0.65),      /* Brillo de la tensión superficial */
                            inset 0 -10px 20px rgba(255, 255, 255, 0.15),   /* Luz de rebote inferior */
                            inset -3px 0 15px rgba(255, 255, 255, 0.08);
                        
                        text-align: center;
                        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                        animation: liquidLensIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
                        box-sizing: border-box;
                    }
                    .modal-apple-glass.salida {
                        animation: liquidLensOut 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                    }
                    
                    @media (max-width: 768px) {
                        .modal-apple-glass {
                            max-width: 330px;
                            padding: 28px 22px;
                        }
                    }
                `;
                document.head.appendChild(estilos);
            }

            // 2. Construcción del contenedor interno
            const modal = document.createElement('div');
            modal.className = 'modal-apple-glass';
            
            let mensajeFormateado = mensaje;
            if (mensajeFormateado.includes('rgba(0,0,0,0.04)') || mensajeFormateado.includes('rgba(21, 128, 61, 0.08)') || mensajeFormateado.includes('rgba(22, 163, 74, 0.12)')) {
                // Forzamos un contenedor de marcador translúcido pero súper nítido
                mensajeFormateado = mensajeFormateado.replace(/rgba\(.*?\)/g, 'rgba(22, 163, 74, 0.15)')
                                                     .replace(/color:.*?;/g, 'color: #16a34a; font-weight: 900; font-size: 1.45rem;');
            }

            modal.innerHTML = `
                <div style="font-size: 3.5rem; margin-bottom: 12px; filter: drop-shadow(0 6px 14px rgba(22, 163, 74, 0.3));">🏆</div>
                <h3 style="margin: 0 0 10px 0; font-size: 1.55rem; font-weight: 800; color: #0f172a; letter-spacing: -0.6px; text-shadow: 0 1px 1px rgba(255,255,255,0.6);">${titulo}</h3>
                <div style="font-size: 1.1rem; font-weight: 700; color: #1e293b; line-height: 1.6; display: inline-block; width: 100%;">${mensajeFormateado}</div>
            `;
            document.body.appendChild(modal);

            // 3. Temporizador de 2 segundos exactos
            setTimeout(() => {
                modal.classList.add('salida');
                modal.addEventListener('animationend', () => {
                    modal.remove();
                });
            }, 2300);
        }

        // ==========================================================================
        // ENVÍO DE DATOS NETO CORREGIDO Y LIMPIEZA ANTIFANTASMA
        // ==========================================================================
        function enviarPronostico() {
            const usuario = document.getElementById('quinielaParticipante').value;
            const idSel = document.getElementById('selectPartido').value;
            
            const inputGolesLocal = document.getElementById('golesLocal');
            const inputGolesVisitante = document.getElementById('golesVisitante');

            const gLocal = inputGolesLocal ? inputGolesLocal.value : "";
            const gVisitante = inputGolesVisitante ? inputGolesVisitante.value : "";

            if (!idSel) return;
            const partido = LISTA_PARTIDOS.find(p => p.id === idSel);
            const ahora = new Date();

            if (partido && partido.bloqueo && ahora >= partido.bloqueo) {
                mostrarModalApple("Acción Bloqueada", "❌ ¡Trampa detectada!<br>No podés mandar pronósticos de partidos que ya empezaron.");
                return; 
            }

            if (!usuario || gLocal === "" || gVisitante === "") return;

            const btn = document.getElementById('btnGuardarQuiniela');
            btn.disabled = true;
            
            // ⚽ Inyectamos la animación de la pelota corriendo hacia la portería
            btn.innerHTML = `
                <div style="position: relative; width: 100%; height: 24px; display: flex; align-items: center; justify-content: flex-start; overflow: hidden;">
                    <div style="position: absolute; left: 10px; right: 35px; height: 2px; background: rgba(255,255,255,0.2); border-radius: 2px;"></div>
                    
                    <span id="balonAnimado" style="
                        position: absolute; 
                        left: 0; 
                        font-size: 1.2rem;
                        display: inline-block;
                        animation: rodarYDeslizar 1.5s linear infinite;
                    ">⚽</span>
                    
                    <span style="
                        position: absolute; 
                        right: 10px; 
                        font-size: 1.3rem;
                    ">🥅</span>
                </div>
            `;

            // Inyectar los Keyframes de CSS si no existen para controlar el rodado real
            if (!document.getElementById('estilosAnimacionBalon')) {
                const estilosBalon = document.createElement('style');
                estilosBalon.id = 'estilosAnimacionBalon';
                estilosBalon.innerHTML = `
                    @keyframes rodarYDeslizar {
                        0% {
                            left: 5px;
                            transform: rotate(0deg);
                        }
                        85% {
                            opacity: 1;
                        }
                        90% {
                            left: calc(100% - 38px); /* Llega justo a la entrada de la portería */
                            transform: rotate(720deg); /* Da dos vueltas completas en su eje */
                            opacity: 1;
                        }
                        95% {
                            left: calc(100% - 30px); /* Entra a la red */
                            transform: rotate(760deg) scale(0.9); /* Se encoge levemente simulando profundidad en la red */
                            opacity: 0; /* Golazo, desaparece momentáneamente */
                        }
                        100% {
                            left: 5px;
                            transform: rotate(0deg);
                            opacity: 0;
                        }
                    }
                `;
                document.head.appendChild(estilosBalon);
            }

            const datosQuiniela = {
                accion: "guardarQuiniela",
                participante: usuario,
                equipoLocal: partido.loc,
                golesLocal: parseInt(gLocal),
                golesVisitante: parseInt(gVisitante),
                equipoVisitante: partido.vis,
                idPartido: partido.id
            };

            // ⚡ LIMPIEZA INMEDIATA: Borramos los campos aquí para matar el "efecto inercia" antes que responda el servidor
            if (inputGolesLocal) inputGolesLocal.value = "";
            if (inputGolesVisitante) inputGolesVisitante.value = "";

            fetch(URL_SCRIPT, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(datosQuiniela)
            })
            .then(() => {
    HISTORIAL_GENERAL_SHEETS.push({
        participante: usuario,
        golesLocal: parseInt(gLocal),
        golesVisitante: parseInt(gVisitante),
        idPartido: idSel
    });

    // Lanzamos la notificación nítida estilo Apple Liquid Glass
    mostrarModalApple(
        "¡Pronóstico Nítido!", 
        `Registrado con éxito:<br><span style="font-weight: 700; color: #111827; display: inline-block; margin-top: 6px; background: rgba(0,0,0,0.04); padding: 2px 10px; border-radius: 6px;">${partido.loc} ${gLocal} - ${gVisitante} ${partido.vis}</span>`
    );
    
    // 🔥 RE-RENDERIZADO AUTOMÁTICO INMEDIATO:
    renderizarPartidosDisputados();
    
    verificarBloqueoPartido();
})
            .catch(error => {
                console.error("Error:", error);
                mostrarModalApple("Error de Conexión", "❌ Hubo un problema al conectar con la base de datos.");
                
                // Si la red falla de verdad, restauramos sus valores para que no los tenga que escribir de nuevo
                if (inputGolesLocal) inputGolesLocal.value = gLocal;
                if (inputGolesVisitante) inputGolesVisitante.value = gVisitante;
                verificarBloqueoPartido();
            });
        }

function renderizarPartidosDisputados() {
    const contenedorHistorial = document.getElementById("listaPartidosDisputados");
    if (!contenedorHistorial) return;

    // Limpiamos el contenedor
    contenedorHistorial.innerHTML = "";

    // Si no hay datos en el historial local
    if (!window.HISTORIAL_GENERAL_SHEETS || HISTORIAL_GENERAL_SHEETS.length === 0) {
        contenedorHistorial.innerHTML = `<div style="text-align: center; color: #94a3b8; font-size: 0.85rem; padding: 10px;">No hay partidos registrados aún.</div>`;
        return;
    }

    // Recorremos el historial a la inversa (para que los más nuevos salgan arriba)
    const historialInvertido = [...HISTORIAL_GENERAL_SHEETS].reverse();

    historialInvertido.forEach(p => {
        // Buscamos si existe la info del partido en tu LISTA_PARTIDOS para traer banderas o nombres nítidos si se requiere.
        // Si no, usamos los datos crudos que guardas en el array.
        const infoPartido = window.LISTA_PARTIDOS ? LISTA_PARTIDOS.find(part => part.id === p.idPartido) : null;
        const local = infoPartido ? infoPartido.loc : (p.equipoLocal || "Local");
        const visitante = infoPartido ? infoPartido.vis : (p.equipoVisitante || "Visitante");

        const divPartido = document.createElement("div");
        divPartido.style.cssText = `
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: 0.85rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        `;

        divPartido.innerHTML = `
            <span style="font-weight: 700; color: #475569;">👤 ${p.participante}</span>
            <span style="color: #1e293b; font-weight: 500;">
                ${local} <strong style="color: #15803d; background: #dcfce7; padding: 2px 6px; border-radius: 4px;">${p.golesLocal}</strong> 
                : 
                <strong style="color: #15803d; background: #dcfce7; padding: 2px 6px; border-radius: 4px;">${p.golesVisitante}</strong> ${visitante}
            </span>
        `;
        contenedorHistorial.appendChild(divPartido);
    });
}

// ==========================================================================
// EASTER EGG SECRETO: MINIJUEGO DE PENALES (TRAYECTORIA LIMITADA + ALTURA FIJA)
// ==========================================================================
function abrirMinijuegoSecreto() {
    if (document.getElementById('modalMinijuegoSecreto')) return;

    if (!document.getElementById('estilosMinijuego')) {
        const estilosJuego = document.createElement('style');
        estilosJuego.id = 'estilosMinijuego';
        estilosJuego.innerHTML = `
            /* ✨ Estilos dinámicos para el título principal */
            .titulo-easter-egg {
                font-size: 1.4rem; font-weight: 800; color: #15803d; letter-spacing: -0.5px; 
                cursor: pointer; user-select: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                display: inline-block;
            }
            .titulo-easter-egg:hover {
                transform: scale(1.05);
                color: #16a34a;
                text-shadow: 0 4px 10px rgba(22, 163, 74, 0.25);
            }

            /* 🟢 MODAL VERDE FÚTBOL MEJORADO */
            .modal-juego-glass {
                position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.03);
                z-index: 15000; width: 92%; max-width: 480px; padding: 25px;
                background: linear-gradient(135deg, rgba(16, 185, 129, 0.28) 0%, rgba(4, 120, 87, 0.15) 100%);
                backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
                border: 1px solid rgba(255, 255, 255, 0.35);
                border-top: 2.5px solid rgba(255, 255, 255, 0.8);
                border-radius: 32px;
                box-shadow: 0 40px 100px rgba(4, 47, 31, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.5);
                text-align: center; color: #111827;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                transition: background 0.3s ease;
            }
            .modal-juego-glass.alerta-roja {
                background: linear-gradient(135deg, rgba(239, 68, 68, 0.35) 0%, rgba(185, 28, 28, 0.2) 100%) !important;
                border: 1px solid rgba(239, 68, 68, 0.5);
            }
            .cancha-mini {
                position: relative; width: 100%; height: 210px; 
                background: rgba(4, 47, 31, 0.3); 
                border: 2px solid rgba(255,255,255,0.4); border-radius: 20px;
                margin: 20px 0; overflow: hidden;
            }
            .porteria-mini {
                position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
                width: 80%; height: 90px; border: 3px solid #ffffff; border-bottom: none;
                background: rgba(255,255,255,0.08); cursor: crosshair; z-index: 10;
            }
            #porteroMini {
                position: absolute; bottom: 0; left: 45%; font-size: 2rem;
                user-select: none; z-index: 5;
            }
            #balonMini {
                position: absolute; bottom: 15px; left: 50%; font-size: 2rem; 
                pointer-events: none; user-select: none;
                filter: drop-shadow(0 6px 8px rgba(0,0,0,0.35));
                transition: all 0.35s cubic-bezier(0.1, 0.5, 0.5, 1);
                transform: translateX(-50%) scale(1) rotate(0deg);
            }
            @keyframes porteroMover {
                0% { left: 5%; }
                50% { left: 80%; }
                100% { left: 5%; }
            }
            .portero-animado { animation: porteroMover 1.8s infinite ease-in-out; }
            
            @keyframes reboteFisico {
                0% { bottom: 95px; transform: translateX(-50%) scale(0.48) rotate(360deg); }
                35% { bottom: 60px; transform: translateX(-50%) scale(0.65) rotate(180deg); }
                65% { bottom: 30px; transform: translateX(-50%) scale(0.85) rotate(45deg); }
                100% { bottom: 15px; transform: translateX(-50%) scale(1) rotate(0deg); }
            }
            .efecto-rebote-activo {
                animation: reboteFisico 0.75s cubic-bezier(0.175, 0.885, 0.32, 1) forwards !important;
            }
            
            @media (max-width: 480px) {
                .modal-juego-glass { padding: 20px 15px; }
                .cancha-mini { height: 180px; }
                .porteria-mini { height: 75px; }
                #balonMini { font-size: 1.7rem; }
                #porteroMini { font-size: 1.7rem; }
            }
        `;
        document.head.appendChild(estilosJuego);
    }

    const modalJuego = document.createElement('div');
    modalJuego.id = 'modalMinijuegoSecreto';
    modalJuego.className = 'modal-juego-glass';
    
    modalJuego.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <span style="font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #064e3b;">🎉 ¿Cuántos goles puedes meter?</span>
            <button onclick="document.getElementById('modalMinijuegoSecreto').remove()" style="background: transparent; border: none; font-size: 1.4rem; cursor: pointer; color: #111827;">✕</button>
        </div>
        <h3 style="margin: 5px 0; font-size: 1.45rem; font-weight: 800; color: #111827;">¡Modo Penales!</h3>
        <p style="margin: 0; font-size: 0.9rem; font-weight: 600; color: #1f2937;">Haz clic dentro de la portería para disparar.</p>
        
        <div style="font-size: 1.25rem; font-weight: 800; margin-top: 15px; color: #111827;">
            ⚽ Goles: <span id="scoreGoles" style="color: #065f46;">0</span> | 🏆 Récord: <span id="recordGoles" style="color: #374151;">0</span>
        </div>

        <div class="cancha-mini">
            <div class="porteria-mini" onclick="dispararPenalPro(event)">
                <span id="porteroMini" class="portero-animado">🧤</span>
            </div>
            <span id="balonMini">⚽</span> 
        </div>
        
        <div id="feedbackJuego" style="height: 25px; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; letter-spacing: 0.5px;"></div>
    `;
    
    document.body.appendChild(modalJuego);

    if (localStorage.getItem('quiniela_record_juego')) {
        document.getElementById('recordGoles').innerText = localStorage.getItem('quiniela_record_juego');
    }
}

let jugandoPateando = false;
let golesActuales = 0;

function dispararPenalPro(event) {
    if (jugandoPateando) return;
    jugandoPateando = true;

    const cancha = document.querySelector('.cancha-mini');
    const balon = document.getElementById('balonMini');
    const portero = document.getElementById('porteroMini');
    const modal = document.getElementById('modalMinijuegoSecreto');
    const score = document.getElementById('scoreGoles');
    const recordLabel = document.getElementById('recordGoles');
    const feedback = document.getElementById('feedbackJuego');

    const rectCancha = cancha.getBoundingClientRect();
    const clickCanchaX = event.clientX - rectCancha.left;
    const centroCanchaX = rectCancha.width / 2;
    
    // Calcular el desvío original en píxeles
    let desvioPx = clickCanchaX - centroCanchaX;

    // 🛠️ LIMITADOR DE TRAYECTORIA (ANTI-TRAMPA)
    // El ancho de la portería ocupa el 80% central de la cancha.
    // El límite físico de atajada del portero está aprox. entre el 10% y el 90% de la cancha.
    const maxDesvioPx = rectCancha.width * 0.38; // Restringe el desvío máximo para que no pase de los postes

    if (desvioPx > maxDesvioPx) {
        desvioPx = maxDesvioPx; // Forzar el balón a ir al poste derecho
    } else if (desvioPx < -maxDesvioPx) {
        desvioPx = -maxDesvioPx; // Forzar el balón a ir al poste izquierdo
    }

    // Calcular la posición exacta de impacto real modificada por los postes
    const disparoRealX = centroCanchaX + desvioPx;

    // Ejecutar tiro: Altura bajada a '95px' idéntica a los guantes
    balon.style.transition = 'all 0.35s cubic-bezier(0.1, 0.4, 0.45, 1)';
    balon.style.bottom = '95px'; 
    balon.style.left = `calc(50% + ${desvioPx}px)`;
    balon.style.transform = `translateX(-50%) scale(0.45) rotate(360deg)`;

    // Evaluar atajada basándose estrictamente en la colisión física modificada
    setTimeout(() => {
        const porteroLeft = portero.offsetLeft;
        const porteroAncho = portero.offsetWidth;
        const centroPorteroPx = porteroLeft + (porteroAncho / 2);
        
        // Comparamos los guantes contra la coordenada real del balón
        const balonCanchaPx = disparoRealX;

        if (Math.abs(centroPorteroPx - balonCanchaPx) < 32) {
            modal.classList.add('alerta-roja');
            feedback.style.color = '#991b1b'; 
            feedback.innerText = "❌ ¡LO PARÓ EL PORTERO!";
            golesActuales = 0;
            score.innerText = golesActuales;

            setTimeout(() => {
                balon.style.transition = 'none';
                balon.className = 'efecto-rebote-activo';
            }, 30);
        } else {
            feedback.style.color = '#065f46'; 
            feedback.innerText = "GOOOOOOOOOOL";
            golesActuales++;
            score.innerText = golesActuales;

            let recordActual = parseInt(localStorage.getItem('quiniela_record_juego') || 0);
            if (golesActuales > recordActual) {
                localStorage.setItem('quiniela_record_juego', golesActuales);
                recordLabel.innerText = golesActuales;
            }
        }
    }, 320);

    // Resetear el escenario de forma limpia
    setTimeout(() => {
        balon.className = '';
        balon.style.transition = 'none';
        balon.style.bottom = '15px';
        balon.style.left = '50%';
        balon.style.transform = 'translateX(-50%) scale(1) rotate(0deg)';
        modal.classList.remove('alerta-roja');
        feedback.innerText = "";
        
        jugandoPateando = false;
    }, 2000);
}
    </script>
